<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0B1E"/>
      <stop offset="100%" stop-color="#1C1435"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E07A"/>
      <stop offset="45%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B07D00"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E07A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7B3FE4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7B3FE4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A017" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square (iOS rounds corners itself) -->
  <rect width="512" height="512" fill="url(#bg)" rx="0"/>

  <!-- Subtle radial glow center -->
  <ellipse cx="256" cy="230" rx="200" ry="180" fill="url(#glow)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#goldStroke)" stroke-width="1"/>

  <!-- Mid decorative ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#goldStroke)" stroke-width="0.5"/>

  <!-- Four corner diamond accents -->
  <g fill="url(#gold)" opacity="0.6">
    <polygon points="256,46 262,56 256,66 250,56" />
    <polygon points="256,446 262,456 256,466 250,456" />
    <polygon points="46,256 56,262 66,256 56,250" />
    <polygon points="446,256 456,262 466,256 456,250" />
  </g>

  <!-- Horizontal thin lines -->
  <line x1="80" y1="256" x2="176" y2="256" stroke="url(#goldStroke)" stroke-width="1"/>
  <line x1="336" y1="256" x2="432" y2="256" stroke="url(#goldStroke)" stroke-width="1"/>

  <!-- Letter P — elegant serif path -->
  <!-- Using geometric shapes to form a clean "P" -->
  <g filter="url(#shadow)">
    <!-- Stem of P -->
    <rect x="164" y="140" width="38" height="232" rx="6" fill="url(#gold)"/>
    <!-- Bowl of P — outer -->
    <path d="M196 140 Q320 140 320 210 Q320 280 196 280 L196 242 Q282 242 282 210 Q282 178 196 178 Z" fill="url(#gold)"/>
  </g>

  <!-- Thin gold baseline -->
  <rect x="144" y="384" width="224" height="2" rx="1" fill="url(#gold)" opacity="0.5"/>

  <!-- Small star/sparkle top right -->
  <g transform="translate(358,130)" fill="url(#gold)" opacity="0.7">
    <polygon points="0,-8 1.5,-1.5 8,0 1.5,1.5 0,8 -1.5,1.5 -8,0 -1.5,-1.5"/>
  </g>
  <!-- Small star bottom left -->
  <g transform="translate(150,375)" fill="url(#gold)" opacity="0.5">
    <polygon points="0,-5 1,-1 5,0 1,1 0,5 -1,1 -5,0 -1,-1"/>
  </g>
</svg>
